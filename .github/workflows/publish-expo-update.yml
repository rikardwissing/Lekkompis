name: Publish Expo Update

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: expo-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-production:
    name: Publish production update
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "You must provide an EXPO_TOKEN repository secret to publish EAS updates."
            echo "Create one at https://expo.dev/settings/access-tokens and save it as EXPO_TOKEN in this repository's GitHub Actions secrets."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish update to production channel
        run: eas update --channel production --message "main@${{ github.sha }}" --non-interactive

  update-pr-preview:
    name: Publish PR preview update
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "You must provide an EXPO_TOKEN repository secret to publish EAS updates."
            echo "Create one at https://expo.dev/settings/access-tokens and save it as EXPO_TOKEN in this repository's GitHub Actions secrets."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish update to PR preview channel
        run: |
          eas update \
            --channel "pr-${{ github.event.pull_request.number }}" \
            --message "pr-${{ github.event.pull_request.number }}@${{ github.sha }}" \
            --non-interactive
