name: Publish Expo Update

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: expo-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-production:
    name: Publish production update
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "You must provide an EXPO_TOKEN repository secret to publish EAS updates."
            echo "Create one at https://expo.dev/settings/access-tokens and save it as EXPO_TOKEN in this repository's GitHub Actions secrets."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish update to production channel
        run: eas update --channel production --message "main@${{ github.sha }}" --non-interactive

  update-pr-preview:
    name: Publish PR preview update
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "You must provide an EXPO_TOKEN repository secret to publish EAS updates."
            echo "Create one at https://expo.dev/settings/access-tokens and save it as EXPO_TOKEN in this repository's GitHub Actions secrets."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm ci

      - name: Create preview update
        id: preview
        uses: expo/expo-github-action/preview@v8
        with:
          command: eas update --channel "pr-${{ github.event.pull_request.number }}" --message "pr-${{ github.event.pull_request.number }}@${{ github.sha }}" --non-interactive
          comment: false
          qr-target: expo-go

      - name: Comment preview links on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- expo-preview-link -->';
            const expoGoLink = `${{ steps.preview.outputs.link }}`.replace(/^https:\/\//, 'exp://');
            const pagesHost = `${context.repo.owner.toLowerCase()}.github.io`;
            const expoGoRedirectLink = `https://${pagesHost}/${context.repo.repo}/expo-go-redirect?target=${encodeURIComponent(expoGoLink)}`;
            const body = `${marker}
            ## Expo Preview

            - **Open in Expo Go:** [Launch in Expo Go](${expoGoRedirectLink})
            - **Expo dashboard:** [Open update page](${{ steps.preview.outputs.link }})
            - **QR code image:**
              ![Expo preview QR code](${{ steps.preview.outputs.qr }})
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
