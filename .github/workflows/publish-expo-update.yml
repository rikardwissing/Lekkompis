name: Publish Expo Update

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: expo-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-production:
    name: Publish production update
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "You must provide an EXPO_TOKEN repository secret to publish EAS updates."
            echo "Create one at https://expo.dev/settings/access-tokens and save it as EXPO_TOKEN in this repository's GitHub Actions secrets."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish update to production channel
        run: eas update --channel production --message "main@${{ github.sha }}" --non-interactive

  update-pr-preview:
    name: Publish PR preview update
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "You must provide an EXPO_TOKEN repository secret to publish EAS updates."
            echo "Create one at https://expo.dev/settings/access-tokens and save it as EXPO_TOKEN in this repository's GitHub Actions secrets."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish update to PR preview channel
        id: publish_pr_update
        run: |
          eas update \
            --channel "pr-${{ github.event.pull_request.number }}" \
            --message "pr-${{ github.event.pull_request.number }}@${{ github.sha }}" \
            --non-interactive | tee eas-update.log

      - name: Extract Expo update link
        id: expo_update_link
        run: |
          UPDATE_URL="$(rg -o 'https://expo.dev/accounts/[^[:space:]]+' eas-update.log | head -n 1)"
          if [ -z "${UPDATE_URL}" ]; then
            UPDATE_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          echo "update_url=${UPDATE_URL}" >> "$GITHUB_OUTPUT"

      - name: Comment PR with Expo update link
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- expo-pr-preview-update -->';
            const body = `${marker}
            🚀 **Expo PR preview update published**

            - **PR:** #${{ github.event.pull_request.number }}
            - **Channel:** \`pr-${{ github.event.pull_request.number }}\`
            - **Commit:** \`${{ github.sha }}\`
            - **Update link:** ${{ steps.expo_update_link.outputs.update_url }}

            _This comment is updated on new commits to this PR._`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
